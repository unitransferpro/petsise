<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>펫시세 — 동물병원 진료비 지도</title>
<meta name="description" content="농림축산식품부가 공개한 전국 동물병원 진료비를 시도·시군구별로 비교하고, 전국 5,459개 동물병원을 찾아보세요.">
<meta name="theme-color" content="#eef3fb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0a0f1e" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#eef3fb; --ink:#0b1b33; --ink2:rgba(11,27,51,.62); --ink3:rgba(11,27,51,.42);
  --accent:#0a84ff; --good:#1fa96a; --bad:#e5484d;
  --glass-hi:rgba(255,255,255,.66); --glass-lo:rgba(255,255,255,.34);
  --glass-line:rgba(255,255,255,.66); --glass-inset:rgba(255,255,255,.8);
  --card-shadow:0 10px 34px rgba(24,40,84,.10);
  --tile-base:rgba(255,255,255,.46); --chip-bg:rgba(255,255,255,.5);
  --track:rgba(11,27,51,.10); --row-line:rgba(11,27,51,.07);
  --dock-bg:rgba(255,255,255,.62);
}
.dk{
  --bg:#0a0f1e; --ink:#f2f5fc; --ink2:rgba(242,245,252,.66); --ink3:rgba(242,245,252,.42);
  --accent:#409cff; --good:#34c47e; --bad:#ff6369;
  --glass-hi:rgba(30,38,64,.72); --glass-lo:rgba(22,28,48,.46);
  --glass-line:rgba(255,255,255,.13); --glass-inset:rgba(255,255,255,.10);
  --card-shadow:0 12px 36px rgba(0,0,0,.42);
  --tile-base:rgba(40,50,82,.5); --chip-bg:rgba(40,50,82,.5);
  --track:rgba(242,245,252,.14); --row-line:rgba(242,245,252,.08);
  --dock-bg:rgba(18,24,44,.72);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg);color:var(--ink);min-height:100dvh;overflow-x:hidden;
  font-feature-settings:"tnum";
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
a{color:inherit}
input,select{font:inherit;color:inherit}

/* ambient aurora */
.aur{position:fixed;border-radius:50%;z-index:-1;opacity:.6;pointer-events:none;transform:translateZ(0)}
.dk .aur{opacity:.24}
.a1{width:56vmax;height:56vmax;left:-18vmax;top:-14vmax;background:radial-gradient(circle,#7cc4ff 0%,rgba(124,196,255,.4) 34%,transparent 68%);animation:drift1 34s ease-in-out infinite alternate}
.a2{width:48vmax;height:48vmax;right:-16vmax;top:18vh;background:radial-gradient(circle,#b9a8ff 0%,rgba(185,168,255,.4) 34%,transparent 68%);animation:drift2 41s ease-in-out infinite alternate}
.a3{width:50vmax;height:50vmax;left:-8vmax;bottom:-20vmax;background:radial-gradient(circle,#7fe7c4 0%,rgba(127,231,196,.4) 34%,transparent 68%);animation:drift3 38s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(9vmax,7vmax)}}
@keyframes drift2{to{transform:translate(-7vmax,10vmax)}}
@keyframes drift3{to{transform:translate(10vmax,-8vmax)}}
@media (prefers-reduced-motion: reduce){.aur{animation:none}}

/* frame */
.app{max-width:480px;margin:0 auto;padding:82px 16px calc(112px + env(safe-area-inset-bottom))}

/* glass primitives */
.card{
  position:relative;isolation:isolate;border-radius:26px;padding:20px;margin-bottom:14px;
  background:linear-gradient(145deg,var(--glass-hi),var(--glass-lo));
  border:1px solid var(--glass-line);
  box-shadow:var(--card-shadow),inset 0 1px 0 var(--glass-inset);
}
.card::before{
  content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:radial-gradient(120% 60% at 18% 0%,rgba(255,255,255,.32),transparent 55%);
}
.dk .card::before{background:radial-gradient(120% 60% at 18% 0%,rgba(255,255,255,.07),transparent 55%)}

/* top bar */
.topbar{
  position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  width:min(456px,calc(100% - 24px));z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 18px;border-radius:22px;
  background:linear-gradient(145deg,var(--glass-hi),var(--glass-lo));
  -webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--glass-line);
  box-shadow:var(--card-shadow),inset 0 1px 0 var(--glass-inset);
}
.brand{font-weight:800;font-size:17px;letter-spacing:-.02em}
.brand small{font-weight:600;color:var(--ink3);margin-left:7px;font-size:12px;letter-spacing:0}
.region-pill{
  display:flex;align-items:center;gap:5px;font-weight:700;font-size:13px;
  padding:7px 13px;border-radius:999px;background:var(--accent);color:#fff;
  box-shadow:0 4px 14px rgba(10,132,255,.35);
}

/* bottom dock */
.dock{
  position:fixed;bottom:calc(12px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  width:min(456px,calc(100% - 24px));z-index:60;
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 6px;border-radius:28px;
  background:var(--dock-bg);
  -webkit-backdrop-filter:blur(26px) saturate(180%);backdrop-filter:blur(26px) saturate(180%);
  border:1px solid var(--glass-line);
  box-shadow:0 14px 40px rgba(24,40,84,.18),inset 0 1px 0 var(--glass-inset);
}
.dock button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 0;border-radius:18px;color:var(--ink3);transition:color .18s,transform .12s;
}
.dock button:active{transform:scale(.92)}
.dock button.on{color:var(--accent)}
.dock svg{width:23px;height:23px}
.dock span{font-size:10px;font-weight:700;letter-spacing:-.01em}
.dock button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* section titles */
.sec-t{font-size:15px;font-weight:800;letter-spacing:-.02em;margin-bottom:3px}
.sec-s{font-size:12.5px;color:var(--ink3);letter-spacing:-.01em;margin-bottom:14px}

/* hero (home) */
.hero{padding:18px 4px 16px}
.eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--accent);margin-bottom:10px}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}
h1{font-size:28px;line-height:1.24;font-weight:800;letter-spacing:-.035em}
.hero p{margin-top:10px;font-size:14px;line-height:1.6;color:var(--ink2);word-break:keep-all}

/* chips */
.chiprow{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin:0 -20px;padding:2px 20px 4px}
.chiprow::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;padding:9px 15px;border-radius:999px;font-size:13.5px;font-weight:600;
  background:var(--chip-bg);border:1px solid var(--glass-line);color:var(--ink2);
  transition:background .18s,color .18s;white-space:nowrap;
}
.chip.on{background:var(--ink);color:var(--bg);font-weight:700;border-color:transparent;box-shadow:0 4px 12px rgba(11,27,51,.22)}
.catrow{margin-bottom:10px}
.chip:focus-visible,.tile:focus-visible,.seg button:focus-visible,.row:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* segmented */
.seg{display:flex;padding:3px;border-radius:13px;background:var(--track);width:fit-content;gap:2px}
.seg button{padding:7px 15px;border-radius:10px;font-size:13px;font-weight:600;color:var(--ink2);transition:all .16s}
.seg button.on{background:var(--glass-hi);color:var(--ink);font-weight:700;box-shadow:0 2px 8px rgba(24,40,84,.14)}
.seg.wide{width:100%}
.seg.wide button{flex:1}
.seg-cap{font-size:11.5px;color:var(--ink3);margin-top:7px}

/* map */
.nat-line{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.nat-line b{font-size:22px;font-weight:800;letter-spacing:-.02em}
.nat-line span{font-size:12px;color:var(--ink3)}
.kmap{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:352px;margin:0 auto}
.tile{
  position:relative;aspect-ratio:1/.94;border-radius:24%;
  background:var(--tile-base);border:1px solid var(--glass-line);
  box-shadow:inset 0 1px 0 var(--glass-inset),0 3px 10px rgba(24,40,84,.07);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:transform .18s cubic-bezier(.3,1.4,.5,1),box-shadow .18s;
}
.tile:active{transform:scale(.94)}
.tile.on{transform:scale(1.06);z-index:2;box-shadow:0 0 0 2.5px var(--accent),0 8px 22px rgba(10,132,255,.3),inset 0 1px 0 var(--glass-inset)}
.tile .nm{font-size:12px;font-weight:700}
.tile .pr{font-size:11px;font-weight:600;color:var(--ink2)}
.tile.jeju{margin-top:6px}
.legend{grid-column:2/5;grid-row:6/8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px}
.legend span{font-size:11px;font-weight:600;color:var(--ink3)}
.legend .bar{width:132px;height:8px;border-radius:99px;background:linear-gradient(90deg,var(--good),var(--tile-base) 50%,var(--bad))}
.legend .lbls{display:flex;justify-content:space-between;width:132px}

/* detail lens */
.d-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.d-region{font-size:14px;font-weight:800}
.d-item{font-size:12px;color:var(--ink3);margin-bottom:14px}
.d-price{font-size:36px;font-weight:800;letter-spacing:-.035em;line-height:1.1}
.d-price small{font-size:18px;font-weight:700;margin-left:2px}
.delta{display:inline-flex;align-items:center;padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:700}
.delta.up{background:rgba(229,72,77,.13);color:var(--bad)}
.delta.dn{background:rgba(31,169,106,.13);color:var(--good)}
.delta.eq{background:var(--track);color:var(--ink2)}
.lens{margin-top:22px}
.lens .track{
  position:relative;height:34px;border-radius:99px;
  background:linear-gradient(90deg,rgba(31,169,106,.28),var(--track) 45%,rgba(229,72,77,.30));
  border:1px solid var(--glass-line);box-shadow:inset 0 1px 3px rgba(24,40,84,.08);
}
.lens .avg{
  position:absolute;top:50%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;
  background:var(--accent);border:3px solid #fff;box-shadow:0 3px 10px rgba(10,132,255,.5);
  transition:left .45s cubic-bezier(.3,1.2,.4,1);
}
.dk .lens .avg{border-color:#0a0f1e}
@media (prefers-reduced-motion: reduce){.lens .avg,.tile,.chip{transition:none}}
.lens .nat{position:absolute;top:-5px;bottom:-5px;width:0;border-left:2px dashed var(--ink3);transition:left .45s}
.lens .nat i{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-style:normal;font-size:10px;font-weight:700;color:var(--ink3);white-space:nowrap}
.lens .ends{display:flex;justify-content:space-between;margin-top:9px;font-size:11.5px;font-weight:600;color:var(--ink3)}
.lens-cap{margin-top:13px;font-size:12.5px;color:var(--ink2)}
.lens-cap b{font-weight:700}

/* list rows */
.grp{margin-top:16px}
.grp:first-of-type{margin-top:4px}
.grp h3{font-size:12px;font-weight:700;color:var(--ink3);margin-bottom:6px;padding-left:2px}
.row{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px;border-radius:16px;text-align:left;transition:background .15s;
}
.row:hover{background:var(--track)}
.row.on{background:rgba(10,132,255,.10)}
.row .rn{font-size:13.5px;font-weight:600;flex:1;min-width:0}
.row .rn small{font-weight:500;color:var(--ink3);font-size:11.5px;margin-left:4px}
.row .rp{font-size:14px;font-weight:750;white-space:nowrap}
.row .rd{font-size:11.5px;font-weight:700;width:52px;text-align:right;white-space:nowrap}
.rd.up{color:var(--bad)}.rd.dn{color:var(--good)}.rd.eq{color:var(--ink3)}

/* home highlight cards */
.hl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hl{border-radius:20px;padding:14px;background:linear-gradient(145deg,var(--glass-hi),var(--glass-lo));border:1px solid var(--glass-line);box-shadow:inset 0 1px 0 var(--glass-inset)}
.hl .t{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.hl .v{font-size:19px;font-weight:800;letter-spacing:-.02em}
.hl .d{font-size:11px;font-weight:700;margin-top:4px}
.hl .d.up{color:var(--bad)}.hl .d.dn{color:var(--good)}.hl .d.eq{color:var(--ink3)}
.quick{display:flex;gap:10px;margin-top:2px}
.quick button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:15px 6px;border-radius:20px;
  background:linear-gradient(145deg,var(--glass-hi),var(--glass-lo));border:1px solid var(--glass-line);
  box-shadow:inset 0 1px 0 var(--glass-inset);font-size:12px;font-weight:700;color:var(--ink2);
}
.quick svg{width:22px;height:22px;color:var(--accent)}

/* hospital list */
.search{
  width:100%;padding:12px 16px;border-radius:16px;border:1px solid var(--glass-line);
  background:var(--chip-bg);color:var(--ink);font-size:14px;outline:none;margin-bottom:10px;
}
.search::placeholder{color:var(--ink3)}
.search:focus{border-color:var(--accent)}
.hrow{
  width:100%;display:flex;align-items:center;gap:12px;padding:13px 10px;border-radius:16px;
  text-align:left;border-bottom:1px solid var(--row-line);
}
.hrow:last-child{border-bottom:0}
.hrow:hover{background:var(--track)}
.hrow .ic{
  flex:0 0 40px;height:40px;border-radius:14px;display:grid;place-items:center;
  background:rgba(10,132,255,.12);color:var(--accent);font-size:17px;font-weight:800;
}
.hrow .bd{flex:1;min-width:0}
.hrow .nm{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hrow .ad{font-size:11.5px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.hrow .gg{font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap}
.count-cap{font-size:12px;color:var(--ink3);margin:2px 2px 10px}
.more-btn{width:100%;padding:13px;border-radius:16px;background:var(--track);font-size:13px;font-weight:700;color:var(--ink2);margin-top:8px}

/* bottom sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(8,12,26,.45);z-index:70;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-bg.show{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);z-index:71;
  width:min(480px,100%);max-height:82dvh;overflow-y:auto;
  border-radius:28px 28px 0 0;padding:14px 20px calc(26px + env(safe-area-inset-bottom));
  background:linear-gradient(160deg,var(--glass-hi),var(--bg) 60%);
  -webkit-backdrop-filter:blur(26px) saturate(180%);backdrop-filter:blur(26px) saturate(180%);
  border:1px solid var(--glass-line);border-bottom:0;
  box-shadow:0 -18px 60px rgba(8,12,26,.3);
  transition:transform .32s cubic-bezier(.3,1.1,.4,1);
}
.sheet.show{transform:translate(-50%,0)}
.sheet .grip{width:40px;height:5px;border-radius:99px;background:var(--track);margin:0 auto 14px}
.sheet h2{font-size:19px;font-weight:800;letter-spacing:-.02em}
.sheet .sub{font-size:12.5px;color:var(--ink3);margin-top:4px}
.sheet .actions{display:flex;gap:10px;margin:16px 0}
.sheet .actions a,.sheet .actions button{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border-radius:16px;
  font-size:13.5px;font-weight:700;text-decoration:none;
}
.act-call{background:var(--accent);color:#fff;box-shadow:0 6px 18px rgba(10,132,255,.35)}
.act-map{background:#03c75a;color:#fff;box-shadow:0 6px 18px rgba(3,199,90,.32)}
.act-copy{background:var(--track);color:var(--ink)}
.sheet .actions svg{width:17px;height:17px;flex:0 0 auto}
.hrow .mapb{
  flex:0 0 36px;height:36px;border-radius:13px;display:grid;place-items:center;
  background:rgba(3,199,90,.13);color:#03c75a;
}
.hrow .mapb svg{width:17px;height:17px}
.sheet .note{font-size:11.5px;line-height:1.6;color:var(--ink3);margin-top:14px;word-break:keep-all}

/* calculator */
.crow{
  width:100%;display:flex;align-items:center;gap:11px;padding:12px 10px;border-radius:16px;text-align:left;
}
.crow:hover{background:var(--track)}
.crow .cb{
  flex:0 0 24px;height:24px;border-radius:9px;border:2px solid var(--ink3);display:grid;place-items:center;
  transition:all .15s;color:transparent;
}
.crow.on .cb{background:var(--accent);border-color:var(--accent);color:#fff}
.crow .cn{flex:1;font-size:13.5px;font-weight:600}
.crow .cn small{font-weight:500;color:var(--ink3);font-size:11.5px;margin-left:4px}
.crow .cp{font-size:13.5px;font-weight:750;white-space:nowrap}
.total-card{position:sticky;top:78px;z-index:5}
.total-card .tt{font-size:12px;font-weight:700;color:var(--ink2)}
.total-card .tv{font-size:32px;font-weight:800;letter-spacing:-.03em;margin-top:2px}
.total-card .tv small{font-size:16px;margin-left:2px}
.total-card .tr{font-size:12px;color:var(--ink3);margin-top:4px}

/* settings */
.set-row{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px 4px;border-bottom:1px solid var(--row-line);text-align:left;
}
.set-row:last-child{border-bottom:0}
.set-row .sl{font-size:14px;font-weight:600}
.set-row .sl small{display:block;font-size:11.5px;color:var(--ink3);font-weight:500;margin-top:3px}
.set-row .sv{font-size:13px;font-weight:700;color:var(--ink3);display:flex;align-items:center;gap:6px}
.set-row select{
  border:1px solid var(--glass-line);background:var(--chip-bg);border-radius:12px;
  padding:8px 10px;font-size:13px;font-weight:600;outline:none;max-width:170px;
}
.ver{text-align:center;font-size:11px;color:var(--ink3);padding:16px 0 4px}

/* misc */
.foot{padding:8px 6px 12px;font-size:11.5px;line-height:1.7;color:var(--ink3);word-break:keep-all}
.foot a{font-weight:600;text-decoration-color:var(--ink3)}
.screen{animation:fadein .22s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){.screen{animation:none}.sheet{transition:none}}
.empty{padding:30px 10px;text-align:center;color:var(--ink3);font-size:13px;line-height:1.7}
</style>
</head>
<body>
<div class="aur a1"></div><div class="aur a2"></div><div class="aur a3"></div>

<header class="topbar">
  <div class="brand">펫시세<small>동물병원 진료비 지도</small></div>
  <button class="region-pill" id="pillRegion" onclick="go('set')">서울</button>
</header>

<main class="app"><div id="view"></div></main>

<nav class="dock" id="dock"></nav>

<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>

<script src="data.js?v=2"></script>
<script>
/* ───────── constants ───────── */
const D = window.VETFEE;
const SHORT = {"11":"서울","26":"부산","27":"대구","28":"인천","29":"광주","30":"대전","31":"울산","36":"세종","41":"경기","42":"강원","43":"충북","44":"충남","45":"전북","46":"전남","47":"경북","48":"경남","50":"제주"};
const GRID = {"11":[2,1],"42":[3,1],"28":[1,2],"41":[2,2],"43":[3,2],"47":[4,2],"44":[1,3],"36":[2,3],"30":[3,3],"27":[4,3],"45":[1,4],"48":[3,4],"31":[4,4],"29":[1,5],"26":[4,5],"46":[1,6],"50":[1,7]};
const CATS = ["진찰료","입원비","예방접종","혈액검사","영상검사","투약·조제"];

function loadGugun(){
  if (GUGUN || GUGUN_P) return GUGUN_P || Promise.resolve();
  GUGUN_P = fetch("gugun.json?v=2").then(r => r.ok ? r.json() : null).then(j => { GUGUN = j; GUGUN_P = null; })
    .catch(() => { GUGUN_P = null; });
  return GUGUN_P;
}
function loadHosp(cd){
  if (HOSP[cd]) return Promise.resolve(HOSP[cd]);
  return fetch(`hospdata/hosp_${cd}.json?v=2`).then(r => r.ok ? r.json() : []).then(j => (HOSP[cd] = j))
    .catch(() => (HOSP[cd] = []));
}

/* ───────── helpers ───────── */
const won = n => n.toLocaleString("ko-KR");
function compact(n){
  if (n >= 1e8) return (n/1e8).toFixed(1).replace(/\.0$/,"") + "억";
  if (n >= 1e4) { const m = n/1e4; return (m >= 100 ? Math.round(m) : m.toFixed(1).replace(/\.0$/,"")) + "만"; }
  return won(n);
}
function natOf(it){
  if (it.nat) return {v: it.nat[1], approx: false};
  const avgs = Object.values(it.r).map(a => a[1]);
  return {v: Math.round(avgs.reduce((s,x)=>s+x,0)/avgs.length), approx: true};
}
// pick the variant of a group matching pet profile
function variantOf(g){
  let vs = g.vars;
  if (vs.length === 1) return vs[0];
  if (g.vars.some(v => /고양이/.test(v.name))) {} // cat/dog split lives at name level, not variant
  const byWt = vs.find(v => v.wt === S.wt);
  return byWt || vs[0];
}
// preferred item names for the pet
const petName = base => {
  if (base === "종합백신") return S.pet === "cat" ? "종합백신(고양이)" : "종합백신(개)";
  if (base === "입원비") return S.pet === "cat" ? "입원비(고양이)" : "입원비(개)";
  return base;
};
function deltaCls(p){ return Math.abs(p) < 1 ? "eq" : p > 0 ? "up" : "dn"; }
function deltaTxt(p){ return Math.abs(p) < 1 ? "평균" : (p > 0 ? "+" : "") + p.toFixed(0) + "%"; }
function esc(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
// gugun stats row for an item: [min,avg,mid,max] or null
function gugunStat(cd, gg, it){
  if (!GUGUN || !gg) return null;
  const arr = GUGUN[cd] && GUGUN[cd][gg];
  return (arr && arr[it.idx] && arr[it.idx][1] > 0) ? arr[it.idx] : null;
}

function cur(){ const g = GROUPS[S.name]; return g.vars.find(v => v.wt === S.wt) || g.vars[0]; }
function renderMap(){
  const it = cur(), nat = natOf(it);
  document.getElementById("mapTitle").textContent = `시도별 평균 — ${S.name}${it.wt ? " · " + it.wt : ""}`;
  document.getElementById("natPrice").textContent = (nat.approx ? "≈ " : "") + won(nat.v) + "원";
  document.getElementById("natLabel").textContent = nat.approx ? "17개 시도 단순평균" : "전국 평균";
  const dark = document.body.classList.contains("dk");
  document.getElementById("kmap").innerHTML = Object.keys(GRID).map(cd => {
    const [c, r] = GRID[cd], a = it.r[cd];
    const dev = Math.max(-1, Math.min(1, ((a[1] - nat.v) / nat.v) / 0.12));
    const col = dev >= 0 ? (dark ? "255,99,105" : "229,72,77") : (dark ? "52,196,126" : "31,169,106");
    const alpha = (Math.abs(dev) * (dark ? 0.34 : 0.4)).toFixed(2);
    const on = cd === S.region;
    return `<button class="tile${on?" on":""}${cd==="50"?" jeju":""}" style="grid-column:${c};grid-row:${r};background:linear-gradient(rgba(${col},${alpha}),rgba(${col},${alpha})),var(--tile-base)"
      aria-pressed="${on}" aria-label="${D.sido[cd]} 평균 ${won(a[1])}원" onclick="pickRegion('${cd}')">
      <span class="nm">${SHORT[cd]}</span><span class="pr">${compact(a[1])}</span></button>`;
  }).join("") + `<div class="legend"><div class="bar"></div><div class="lbls"><span>평균보다 저렴</span><span>비쌈</span></div></div>`;
  document.getElementById("pillRegion").textContent = SHORT[S.region] + (S.gugun ? " · " + S.gugun : "");
}
function renderDetail(){
  const it = cur(), nat = natOf(it), a = it.r[S.region];
  const pct = (a[1] - nat.v) / nat.v * 100;
  const cls = Math.abs(pct) < 1 ? "eq" : pct > 0 ? "up" : "dn";
  const dTxt = Math.abs(pct) < 1 ? "전국 평균 수준" : `전국 평균${nat.approx ? "(≈)" : ""} 대비 ${pct > 0 ? "+" : ""}${pct.toFixed(1)}%`;
  const span = Math.max(1, a[3] - a[0]);
  const pos = v => Math.max(2, Math.min(98, (v - a[0]) / span * 100)).toFixed(1);
  const natIn = nat.v >= a[0] && nat.v <= a[3];
  document.getElementById("detail").innerHTML = `
    <div class="d-head"><span class="d-region">${D.sido[S.region]}</span><span class="delta ${cls}">${dTxt}</span></div>
    <div class="d-item">${S.name}${it.wt ? " · " + it.wt : ""} · 평균</div>
    <div class="d-price">${won(a[1])}<small>원</small></div>
    <div class="lens">
      <div class="track">
        ${natIn ? `<div class="nat" style="left:${pos(nat.v)}%"><i>전국 ${compact(nat.v)}</i></div>` : ""}
        <div class="avg" style="left:${pos(a[1])}%"></div>
      </div>
      <div class="ends"><span>최저 ${won(a[0])}원</span><span>최고 ${won(a[3])}원</span></div>
      <div class="lens-cap">이 지역 병원들의 가격 폭이에요. 중간값은 <b>${won(a[2])}원</b> — 절반의 병원이 이보다 쌉니다.</div>
    </div>`;
}
function renderList(){
  document.getElementById("listTitle").textContent = `${D.sido[S.region]} 전체 항목`;
  document.getElementById("listWrap").innerHTML = CATS.map(cat => {
    const rows = namesByCat(cat).map(n => {
      const g = GROUPS[n], v = (GROUPS[S.name] === g) ? cur() : variantOf(g);
      const nat = natOf(v), a = v.r[S.region];
      const pct = (a[1] - nat.v) / nat.v * 100;
      return `<button class="row${n===S.name?" on":""}" onclick="pickItem('${esc(n)}','${cat}')">
        <span class="rn">${n}${v.wt ? `<small>${v.wt}</small>` : ""}</span>
        <span class="rp">${won(a[1])}원</span>
        <span class="rd ${deltaCls(pct)}">${deltaTxt(pct)}</span></button>`;
    }).join("");
    return `<div class="grp"><h3>${cat}</h3>${rows}</div>`;
  }).join("");
}
function pickCat(c){ S.cat = c; S.name = namesByCat(c)[0]; fixWt(); save(); renderPriceParts(); }
function pickItem(n, c){
  S.name = n; S.cat = c || GROUPS[n].cat; fixWt(); save();
  if (S.tab !== "price") { go("price"); }
  else { renderPriceParts(); if (c) document.getElementById("mapCard").scrollIntoView({behavior:"smooth", block:"center"}); }
}
function pickWt(w){ S.wt = w; save(); renderPriceParts(); }
function pickRegion(cd){ S.region = cd; if (S.gugun) S.gugun = ""; save(); renderMap(); renderDetail(); renderList(); }
function fixWt(){ const wts = GROUPS[S.name].vars.map(v => v.wt).filter(Boolean); if (wts.length && !wts.includes(S.wt)) S.wt = wts[0]; }

    `<button class="chip${cd===S.region?" on":""}" onclick="hospRegion('${cd}')">${SHORT[cd]}</button>`).join("");

    if (S.tab !== "hosp") return;
    const guguns = [...new Set(list.map(h => h[1]))].sort((a,b) => a.localeCompare(b,"ko"));
    el("hGugun").innerHTML = `<button class="chip${!hospGugunF?" on":""}" onclick="hospGugun('')">전체</button>` +

    el("hList").innerHTML = `<div class="count-cap">${D.sido[S.region]}${hospGugunF ? " " + hospGugunF : ""} · ${won(rows.length)}곳</div>` +

  });
}
function hospRegion(cd){ S.region = cd; S.gugun = ""; hospGugunF = ""; hospShown = 40; save(); render(); }
function hospGugun(g){ hospGugunF = g; hospShown = 40; renderHospParts(); }
function hospSearch(q){ hospQuery = q; hospShown = 40; clearTimeout(hospSearch._t); hospSearch._t = setTimeout(renderHospParts, 200); }
function hospMore(){ hospShown += 60; renderHospParts(); }

function openHosp(i){
  const h = (HOSP[S.region] || [])[i]; if (!h) return;
  const gg = h[1];
  const render_ = () => {
    const rows = CATS.map(cat => {
      const items = namesByCat(cat).map(n => {
        const v = variantOf(GROUPS[n]);
        const g = gugunStat(S.region, gg, v);
        const sido = v.r[S.region];
        const a = g || sido, isGu = !!g;
        return `<div class="row" style="cursor:default">
          <span class="rn">${n}${v.wt ? `<small>${v.wt}</small>` : ""}</span>
          <span class="rp">${a ? won(a[1]) + "원" : "—"}</span>
          ${isGu ? "" : `<span class="rd eq">시도 평균</span>`}</div>`;
      }).join("");
      return `<div class="grp"><h3>${cat}</h3>${items}</div>`;
    }).join("");
    document.getElementById("sheet").innerHTML = `
      <div class="grip"></div>
      <h2>${esc(h[0])}</h2>
      <div class="sub">${D.sido[S.region]} ${esc(h[2])}${h[4] ? " · " + h[4] + "년 개원" : ""}</div>
      <div class="actions">
        ${h[3] ? `<a class="act-call" href="tel:${h[3]}">${IC.call}전화</a>` : ""}
        <a class="act-map" href="${naverUrl(h)}" target="_blank" rel="noopener">${IC.pin}네이버 지도</a>
        <button class="act-copy" onclick="copyAddr('${esc(D.sido[S.region] + " " + h[2])}')">복사</button>
      </div>
      <div class="sec-t" style="margin-top:6px">${gg} 시세 참고</div>
      <div class="sec-s">공시 조사 통계예요. 이 병원의 실제 가격은 병원에 게시된 비용을 확인하세요.</div>
      ${rows}
      <p class="note">병원별 개별 가격은 법적으로 각 병원 안에 게시돼요. 여기 표시된 값은 ${gg}${GUGUN && GUGUN[S.region] && GUGUN[S.region][gg] ? "" : " 대신 " + D.sido[S.region]} 지역의 조사 평균입니다.</p>`;
    document.getElementById("sheetBg").classList.add("show");
    document.getElementById("sheet").classList.add("show");
  };
  GUGUN ? render_() : loadGugun().then(render_);
}
function copyAddr(t){ navigator.clipboard && navigator.clipboard.writeText(t); }
function naverUrl(h){ return "https://map.naver.com/p/search/" + encodeURIComponent(`${D.sido[S.region]} ${h[1]} ${h[0]}`); }
function openNaver(i){ const h = (HOSP[S.region] || [])[i]; if (h) window.open(naverUrl(h), "_blank", "noopener"); }
function closeSheet(){
  document.getElementById("sheetBg").classList.remove("show");
  document.getElementById("sheet").classList.remove("show");
}

/* ───────── CALCULATOR ───────── */
function vCalc(){
  const sel = new Set(S.calc);
  let sumAvg = 0, sumMin = 0, sumMax = 0;
  const rows = CATS.map(cat => {
    const items = namesByCat(cat).map(n => {
      const v = variantOf(GROUPS[n]);
      const g = S.gugun ? gugunStat(S.region, S.gugun, v) : null;
      const a = g || v.r[S.region];
      const on = sel.has(n);
      if (on) { sumAvg += a[1]; sumMin += a[0]; sumMax += a[3]; }
      return `<button class="crow${on?" on":""}" onclick="calcToggle('${esc(n)}')">
        <span class="cb"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 10 18 19.5 6.5"/></svg></span>
        <span class="cn">${n}${v.wt ? `<small>${v.wt}</small>` : ""}</span>
        <span class="cp">${won(a[1])}원</span></button>`;
    }).join("");
    return `<div class="grp"><h3>${cat}</h3>${items}</div>`;
  }).join("");
  return `<div class="screen">
    <section class="card total-card">
      <div class="tt">선택 항목 예상 합계 (추정치 · ${S.gugun ? S.gugun : D.sido[S.region]} 평균 기준)</div>
      <div class="tv">${won(sumAvg)}<small>원</small></div>
      <div class="tr">병원에 따라 ${won(sumMin)}원 ~ ${won(sumMax)}원까지 차이 날 수 있어요 · ${S.calc.length}개 항목</div>
    </section>
    <section class="card">
      <div class="sec-t">항목 선택</div>
      <div class="sec-s">오늘 받을 진료를 체크하세요 · ${S.pet === "cat" ? "고양이" : "개 " + S.wt} 프로필 기준</div>
      ${rows}
    </section>
    ${footHtml()}
  </div>`;
}
function calcToggle(n){
  const i = S.calc.indexOf(n);
  if (i >= 0) S.calc.splice(i, 1); else S.calc.push(n);
  save(); render();
}

/* ───────── SETTINGS ───────── */
function vSet(){
  const sidoOpts = Object.keys(SHORT).map(cd => `<option value="${cd}"${cd===S.region?" selected":""}>${D.sido[cd]}</option>`).join("");
  const ggList = (GUGUN && GUGUN[S.region]) ? Object.keys(GUGUN[S.region]).sort((a,b)=>a.localeCompare(b,"ko")) : [];
  const ggOpts = `<option value="">전체 (시도 평균)</option>` + ggList.map(g => `<option value="${g}"${g===S.gugun?" selected":""}>${g}</option>`).join("");
  return `<div class="screen">
    <section class="card">
      <div class="sec-t">내 프로필</div>
      <div class="sec-s">시세와 계산기가 이 기준으로 보여져요</div>
      <div class="set-row"><span class="sl">지역 (시/도)</span>
        <select onchange="setRegion(this.value)">${sidoOpts}</select></div>
      <div class="set-row"><span class="sl">시/군/구<small>고르면 시세·계산기가 동네 기준이 돼요</small></span>
        <select onchange="setGugun(this.value)" ${ggList.length ? "" : "disabled"}>${ggOpts}</select></div>
      <div class="set-row"><span class="sl">반려동물</span>
        <div class="seg"><button class="${S.pet==="dog"?"on":""}" onclick="setPet('dog')">🐶 개</button><button class="${S.pet==="cat"?"on":""}" onclick="setPet('cat')">🐱 고양이</button></div></div>
      <div class="set-row"><span class="sl">체중 구간<small>진찰료·입원비 등 체중별 항목에 적용</small></span>
        <div class="seg">${["5kg","10kg","20kg"].map(w => `<button class="${S.wt===w?"on":""}" onclick="setWt('${w}')">${w}</button>`).join("")}</div></div>
    </section>
    <section class="card">
      <div class="sec-t">화면</div>
      <div class="set-row"><span class="sl">테마</span>
        <div class="seg">${[["system","시스템"],["light","라이트"],["dark","다크"]].map(([v,l]) => `<button class="${S.theme===v?"on":""}" onclick="setTheme('${v}')">${l}</button>`).join("")}</div></div>
    </section>
    <section class="card">
      <div class="sec-t">데이터</div>
      <div class="set-row"><span class="sl">진료비 통계<small>농림축산식품부 동물병원 진료비 현황 공개시스템</small></span><span class="sv">${SRC_DATE} 조회</span></div>
      <div class="set-row"><span class="sl">병원 목록<small>행정안전부 지방행정 인허가 데이터 · 영업 중 5,459곳</small></span><span class="sv">${HOSP_DATE} 기준</span></div>
      <div class="set-row"><span class="sl">저장 위치<small>프로필은 이 기기에만 저장돼요. 서버로 보내지 않아요.</small></span><span class="sv">기기 내</span></div>
    </section>
    <section class="card">
      <div class="sec-t">앱 정보</div>
      <div class="set-row"><span class="sl">버전</span><span class="sv">${VERSION}</span></div>
      <div class="set-row"><a class="sl" href="https://animalclinicfee.or.kr" target="_blank" rel="noopener">공시 원본 보기<small>animalclinicfee.or.kr 새 창으로 열려요</small></a><span class="sv">↗</span></div>
      <div class="set-row"><a class="sl" href="mailto:minjoon@logify.co.kr?subject=%ED%8E%AB%EC%8B%9C%EC%84%B8%20%EB%AC%B8%EC%9D%98">문의 보내기<small>잘못된 정보나 제안을 알려주세요</small></a><span class="sv">✉️</span></div>
      <div class="set-row"><span class="sl">면책<small>표시 가격은 조사 통계이며 실제 청구액은 병원·진료 내용에 따라 달라요. 진료 판단의 근거로 사용할 수 없어요.</small></span></div>
    </section>
    <div class="ver">펫시세 v${VERSION} · 데이터로 병원비 걱정을 덜어드려요</div>
  </div>`;
}
function setRegion(cd){ S.region = cd; S.gugun = ""; save(); loadGugun().then(() => render()); render(); }
function setGugun(g){ S.gugun = g; save(); render(); }
function setPet(p){
  S.pet = p;
  if (/종합백신|입원비/.test(S.name)) S.name = petName(S.name.replace(/\(.+\)/,""));
  S.calc = S.calc.map(n => /종합백신|입원비/.test(n) ? petName(n.replace(/\(.+\)/,"")) : n);
  S.calc = [...new Set(S.calc)];
  save(); render();
}
function setWt(w){ S.wt = w; save(); render(); }
function setTheme(t){ S.theme = t; save(); applyTheme(); render(); }

/* ───────── shared ───────── */
function footHtml(){
  return `<footer class="foot">
    가격은 각 병원이 게시한 비용을 조사한 결과예요. 실제 청구액은 동물 상태와 진료 내용에 따라 달라질 수 있습니다.<br>
    출처: <a href="https://animalclinicfee.or.kr" target="_blank" rel="noopener">농림축산식품부 동물병원 진료비 현황 공개시스템</a> (${SRC_DATE} 조회)
    · <a href="https://www.localdata.go.kr" target="_blank" rel="noopener">행정안전부 지방행정 인허가 데이터</a> (${HOSP_DATE})
  </footer>`;
}
function render(){
  renderDock();
  const v = document.getElementById("view");
  if (S.tab === "home") v.innerHTML = vHome();
  else if (S.tab === "price") { v.innerHTML = vPrice(); renderPriceParts(); }
  else if (S.tab === "hosp") { v.innerHTML = vHosp(); renderHospParts(); }
  else if (S.tab === "calc") v.innerHTML = vCalc();
  else v.innerHTML = vSet();
  document.getElementById("pillRegion").textContent = SHORT[S.region] + (S.gugun ? " · " + S.gugun : "");
}
applyTheme();
render();
loadGugun();
</script>
</body>
</html>
